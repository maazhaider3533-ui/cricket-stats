<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Player CLicked</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Cricket stats 🏏</h1>
        <nav>
            <a href="index.html">Home</a>
            <a href="players.html">Players</a>
            <a href="matches.html">Matches</a>
            <a href="rankings.html">Rankings</a>
        </nav>  
    </header>
    <main>
        <h2><a id="backNav" href="players.html">← back to Players</a></h2>
        <section class="hero">
            <h2>Haider</h2>
        </section>

        <section class="player-profile">

            <div class="card">
                <h3>Career Summary</h3>
        
                <div class="stat-row">
                    <span>Matches</span>
                    <span>21</span>
                </div>
        
                <div class="stat-row">
                    <span>Runs</span>
                    <span>162</span>
                </div>
        
                <div class="stat-row">
                    <span>Highest</span>
                    <span>30*</span>
                </div>
        
                <div class="stat-row">
                    <span>Average</span>
                    <span>18.35</span>
                </div>
        
                <div class="stat-row">
                    <span>Strike Rate</span>
                    <span>90.6</span>
                </div>
            </div>
        
            <div class="card">
                <h3>Batting Statistics</h3>
        
                <div class="stat-row">
                    <span>4s</span>
                    <span>9</span>
                </div>
        
                <div class="stat-row">
                    <span>6s</span>
                    <span>7</span>
                </div>
        
                <div class="stat-row">
                    <span>50s</span>
                    <span>0</span>
                </div>
        
                <div class="stat-row">
                    <span>100s</span>
                    <span>0</span>
                </div>
            </div>
        
            <div class="card">
                <h3>Bowling Statistics</h3>
        
                <div class="stat-row">
                    <span>Wickets</span>
                    <span>11</span>
                </div>
        
                <div class="stat-row">
                    <span>Economy</span>
                    <span>6.4</span>
                </div>
        
                <div class="stat-row">
                    <span>Best Bowling</span>
                    <span>2/18</span>
                </div>
            </div>
        
            <div class="card">
                <h3>Recent Innings</h3>
        
                <div class="innings">
                    <span>14</span>
                    <span>18</span>
                    <span>7</span>
                    <span>32*</span>
                    <span>28</span>
                </div>
        
            </div>

        </section>
    </main>
</body>
</html>
